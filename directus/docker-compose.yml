services:
  directus:
    image: directus/directus:11.15.4
    container_name: directus
    oom_score_adj: -100
    restart: unless-stopped
    ports:
      - "${PORT_DIRECTUS:-8056}:${DIRECTUS_INTERNAL_PORT:-8055}"
    environment:
      - SECRET=${DIRECTUS_SECRET:-change-me-to-a-random-string}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DB_CLIENT=pg
      - DB_HOST=postgres
      - DB_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      - DB_DATABASE=directus
      - DB_USER=directus
      - DB_PASSWORD=${DB_PASSWORD:-directus123}
      - CACHE_ENABLED=true
      - CACHE_STORE=redis
      - CACHE_AUTO_PURGE=true
      - REDIS=redis://redis:${REDIS_INTERNAL_PORT:-6379}
      - PUBLIC_URL=http://${SERVER_IP:-localhost}:${PORT_DIRECTUS:-8056}
      - CORS_ENABLED=true
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PATCH,DELETE
      - CORS_ALLOWED_HEADERS=Content-Type,Authorization
      - CORS_EXPOSED_HEADERS=Content-Disposition
      - CORS_CREDENTIALS=false
      - CORS_MAX_AGE=18000
      - TZ=UTC
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${DIRECTUS_INTERNAL_PORT:-8055}/server/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg15
    container_name: directus-postgres
    oom_score_adj: -500
    restart: unless-stopped
    ports:
      - "${PORT_POSTGRES:-5433}:${POSTGRES_INTERNAL_PORT:-5432}"
    environment:
      - POSTGRES_DB=directus
      - POSTGRES_USER=directus
      - POSTGRES_PASSWORD=${DB_PASSWORD:-directus123}
      - TZ=UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d directus"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: directus-redis
    restart: unless-stopped
    ports:
      - "${PORT_REDIS:-6380}:${REDIS_INTERNAL_PORT:-6379}"
    entrypoint: ["/usr/local/bin/redis-entrypoint.sh"]
    command: []
    volumes:
      - redis-data:/data
      - ./redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  directus-uploads:
  directus-extensions:
  postgres-data:
  redis-data:

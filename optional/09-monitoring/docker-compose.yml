# Optional: Nginx Proxy Manager + Grafana
# Uncomment services as needed. Ports and credentials come from root .env.

services:
  nginxproxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginxproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "${PORT_NPM:-81}:81"
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - shared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${PORT_GRAFANA:-3004}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - shared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  npm_data:
  npm_letsencrypt:
  grafana_data:

networks:
  shared:
    external: true
    name: ${DOCKER_NETWORK:-directus_default}

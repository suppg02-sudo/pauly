services:
  react-admin:
    build: .
    container_name: react-admin
    restart: unless-stopped
    ports:
      - "${PORT_REACT_ADMIN:-5200}:5200"
    environment:
      - PORT=5200
    networks:
      - shared
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  shared:
    external: true
    name: ${DOCKER_NETWORK:-directus_default}
